server:
  port: 8083

spring:
  datasource:
    driver-class-name: dm.jdbc.driver.DmDriver
    url: jdbc:dm://${DB_HOST:localhost}:5236/${DB_NAME:toilet_db}
    username: ${DB_USERNAME:toilet_db}
    password: ${DB_PASSWORD:Toilet123456}
    hikari:
      connection-test-query: SELECT 1
      connection-timeout: 30000
      maximum-pool-size: 10
      minimum-idle: 2
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.toilet.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
    database-id: dm
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: ${JWT_SECRET:ihRjWFVIUYEDR/oe+n0UJruWV8OybViuMeJ8VSp+W7U=}
  expiration: 86400000

app:
  public-apis: /api/auth/login,/api/public/**
